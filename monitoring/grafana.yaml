apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        adminPassword: admin
        service:
          type: ClusterIP
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://prometheus-server.monitoring.svc.cluster.local
                isDefault: true
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: ""
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
        dashboards:
          default:
            hello-newapp-monitoring:
              json: |
                {
                  "title": "hello-newapp-monitoring",
                  "tags": ["hello-newapp", "prometheus", "gitops"],
                  "timezone": "browser",
                  "schemaVersion": 39,
                  "version": 1,
                  "refresh": "10s",
                  "time": {
                    "from": "now-15m",
                    "to": "now"
                  },
                  "panels": [
                    {
                      "type": "stat",
                      "title": "Total Requests",
                      "targets": [
                        {
                          "expr": "sum(hello_newapp_requests_total)",
                          "refId": "A"
                        }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 8,
                        "x": 0,
                        "y": 0
                      }
                    },
                    {
                      "type": "stat",
                      "title": "Scrape Targets Up",
                      "targets": [
                        {
                          "expr": "sum(up{namespace=~\"hello-newapp-.*\"})",
                          "refId": "A"
                        }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 8,
                        "x": 8,
                        "y": 0
                      }
                    },
                    {
                      "type": "stat",
                      "title": "Request Rate",
                      "targets": [
                        {
                          "expr": "sum(rate(hello_newapp_requests_total[5m]))",
                          "refId": "A"
                        }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 8,
                        "x": 16,
                        "y": 0
                      }
                    },
                    {
                      "type": "timeseries",
                      "title": "Requests By Environment",
                      "targets": [
                        {
                          "expr": "sum by (namespace) (hello_newapp_requests_total)",
                          "refId": "A"
                        }
                      ],
                      "gridPos": {
                        "h": 8,
                        "w": 24,
                        "x": 0,
                        "y": 5
                      }
                    },
                    {
                      "type": "timeseries",
                      "title": "Request Rate By Environment",
                      "targets": [
                        {
                          "expr": "sum by (namespace) (rate(hello_newapp_requests_total[5m]))",
                          "refId": "A"
                        }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps"
                        }
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 13
                      }
                    },
                    {
                      "type": "timeseries",
                      "title": "Memory Usage By Environment",
                      "targets": [
                        {
                          "expr": "sum by (namespace) (process_resident_memory_bytes{namespace=~\"hello-newapp-.*\"})",
                          "refId": "A"
                        }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "bytes"
                        }
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 13
                      }
                    },
                    {
                      "type": "timeseries",
                      "title": "Target Health",
                      "targets": [
                        {
                          "expr": "up{namespace=~\"hello-newapp-.*\"}",
                          "refId": "A"
                        }
                      ],
                      "gridPos": {
                        "h": 8,
                        "w": 24,
                        "x": 0,
                        "y": 21
                      }
                    }
                  ]
                }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
